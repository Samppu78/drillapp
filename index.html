<<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sandvik Drilling Settings Tool</title>

<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">

<style>
:root{
  --bg:#000000;
  --panel:#0b1220;
  --panel2:#18212f;
  --accent:#38bdf8;
  --accent2:#22c55e;
  --text:#e5e7eb;
  --muted:#9ca3af;
  --ring:rgba(56,189,248,.25);

  /* DARKER SANDVIK-STYLE GRAYS */
  --top-gray:#2a333d;
  --middle-gray:#43505d;
  --bottom-gray:#1f2730;

  /* HOME / CATEGORY BIT IMAGE CONTROL */
  --bit-width:800;
  --bit-top:80%;
  --bit-left:50%;
}

*{box-sizing:border-box}

html, body{
  height:100%;
  margin:0;
  padding:0;

}

body{
  margin:0;
  font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
  background:var(--bg);
  color:var(--text);
}

#app{
  min-height:100vh;
}

.subtitle{
  font-size:1.3rem;
  color:#eef2f7;
  margin-top:0.5rem;
  letter-spacing:.2px;
}

.brand{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  margin:0;
  text-align:center;
}

.logo{
  width:260px;
  margin-bottom:1rem;
  filter:brightness(0) invert(1);
}

.page-title{
  margin:0 0 .7rem 0;
  font-size:2.3rem;
  letter-spacing:.5px;
  color:#000000;
width:100%;
text-align:center;
}

.back{
  cursor:pointer;
  opacity:.95;
  font-weight:800;
  font-size:1.16rem;
  color:#ffffff;

  position:absolute;
  left:15px;
  top:20px;

  z-index:99999;

  pointer-events:auto;
}

.back:hover{
  opacity:1;
  transform:scale(1.05);
}


/* ---------- SHARED LAYOUT ---------- */
.app-layout{
  min-height:100vh;
  display:flex;
  flex-direction:column;
  position:relative;
  overflow:hidden;
}

.top-section{
  height:20vh;           /* 🔥 tärkein muutos */
  background:#000000;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:28px 20px;
  flex:0 0 auto;         /* 🔥 poistetaan lukittu flex */
  position:relative;
  z-index:3;
}
.middle-section{
  min-height:35vh;
  background:#ffffff;
  display:flex;
 align-items:flex-start;
  justify-content:center;
  padding:20px;
  flex:0 0 35vh;
  position:relative;
  z-index:4; /* tärkeä: tämä nostaa sisällön tumman yläosan päälle */
}

.bottom-section{
  flex:1 0 45vh;
  min-height:45vh;
  background:#000000;
  position:relative;
  z-index:0;   /* ✅ tärkeä muutos */
}

/* ---------- CONTENT WRAPPERS ---------- */
.content-wrap{
  width:100%;
  max-width:1100px;
  margin:0 auto;
}

.subpage-offset{
  margin-top:60px;
}

.content-wrap.narrow{
  max-width:980px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit, minmax(220px, 220px));
  gap:20px;
  justify-content:center;
  align-items:start;
}

.category-page #categoryGrid{
  margin-top:38px;
  width:auto;
}

/* ---------- PAGE HEADERS ---------- */

.page-header{
  position:relative;
  z-index:20;

  margin-top:-20px;
  margin-bottom:10px;
  padding-top:0;

  width:100%;

  display:block;        /* 🔥 tärkein muutos */
  text-align:center;    /* 🔥 tämä keskittää oikein */
}

.page-header h1{
  margin:0;
  display:block;
  width:100%;
  text-align:center;
}

/* ✅ category EI siirrä enää vinoon */
.category-page .page-header{
  margin-top:0;
}

/* ✅ Drill header sama logiikka */
.page-header-drill{
  position:relative;
  z-index:20;
  margin-top:0;
  margin-bottom:10px;
  padding-top:10px;

  width:100%;
  display:block;
  text-align:center;
}

.page-header-drill h1{
  margin:0;
  width:100%;
  text-align:center;
}

/* ✅ Mittariston sijainti */
.drill-stage{
  margin-top:120px;

}/* ---------- CARDS ---------- */

.card{
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;

  width:220px;
  min-height:140px;

  
  background:#000000;
  border:1px solid #ff8200;
  border-radius:22px;
  padding:2rem;
  cursor:pointer;
  text-align:center;
  box-shadow:0 14px 34px rgba(0,0,0,.28);
  transition:transform .2s ease, box-shadow .2s ease, border-color .2s ease, background .2s ease;
  font-weight:700;
  color:#ffffff;
}

.card:hover{
  transform:translateY(-4px);
  background:#111111;
  box-shadow:0 10px 25px rgba(0,0,0,.3);
  
}

.card small{
  display:block;
  margin-top:.5rem;
  color:#cbd5e1;
  font-weight:500;
  font-size:0.7rem;
}


/* ---------- TOOL SHELL ---------- */
.app-shell{
  
background:
  linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,.01)),
  linear-gradient(145deg, #161c22, #2e3943);


  border:1px solid rgba(255,255,255,.08);
  border-radius:26px;
  padding:1.8rem;

  /* 🔥 WOW EFFECT (depth + glow) */
  box-shadow:
    0 20px 45px rgba(0,0,0,.55),                 /* syvyys */
    inset 0 1px 0 rgba(255,255,255,.06),         /* kevyt metallivalo */
    inset 0 -3px 8px rgba(0,0,0,.4),             /* alareunan varjo */
    0 0 20px rgba(255,130,0,.3);                /* 🔥 Sandvik orange glow */

  margin-top:-6px;

  position:relative;
  overflow:hidden;
}

.app-shell::before{
  content:"";
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;

  background:
    linear-gradient(
      120deg,
      transparent 0%,
      rgba(255,255,255,.08) 40%,
      transparent 70%
    );

  pointer-events:none;
  opacity:.35;
}

.block{
  margin-bottom:1.8rem;
}

.block-title{
  font-size:1rem;
  color:#d1d5db;
  margin-bottom:.75rem;
  letter-spacing:.3px;
  font-weight:700;
}

/* ---------- POWER ---------- */
.power-wrap{
  background:
    linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.01)),
    var(--panel2);
  border:1px solid rgba(255,255,255,.06);
  border-radius:22px;
  padding:.45rem 1rem .35rem;
}

.power-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:0px;
}

.power-label{
  font-size:1rem;
  color:#d1d5db;
  font-weight:600;
}

.power-value{
  font-size:1.2rem;
  margin-bottom:0px;
  line-height:1;
  font-weight:800;
  letter-spacing:.5px;
  color:#ffffff;

}

.power-scale{
  display:flex;
  justify-content:space-between;
  margin-top:.45rem;
  font-size:.9rem;
  color:#cbd5e1;
}

input[type=range]{
  -webkit-appearance:none;
  width:100%;
  height:8px;
  border-radius:6px;
  outline:none;

  background:linear-gradient(
    to right,
    #22c55e 0%,
    #22c55e 50%,
    #eab308 65%,
    #ef4444 100%
  );
}

input[type=range]::-webkit-slider-thumb{
  -webkit-appearance:none;
  width:20px;
  height:20px;
  border-radius:50%;
  background:#ffffff;
  border:2px solid #0f172a;
  cursor:pointer;
margin-top:-6px;
}

input[type=range]::-moz-range-thumb{
  width:20px;
  height:20px;
  border-radius:50%;
  background:#ffffff;
  border:2px solid #0f172a;
  cursor:pointer;
}
.power-scale{
  display:flex;
  justify-content:space-between;
}



/* ---------- PRESSURE CIRCLES ---------- */

.pressure-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit, minmax(140px, 1fr));
  gap:20px;
  justify-items:center;
  margin-top:.6rem;
}

.pressure-card{
  width:150px;
  height:150px;
  border-radius:50%;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:.75rem;
  background:linear-gradient(135deg,#60a5fa,#38bdf8);
  color:#03131d;
  box-shadow:
    0 14px 28px rgba(0,0,0,.28),
    inset 0 2px 8px rgba(255,255,255,.15);
  flex:0 0 auto;
  transition:opacity .2s ease, filter .2s ease, transform .2s ease;
}

.pressure-title{
  font-size:.82rem;
  font-weight:800;
  line-height:1.12;
  max-width:110px;
  margin-bottom:.35rem;
}

.pressure-number{
  font-size:2.05rem;
  line-height:1;
  font-weight:900;
  letter-spacing:.5px;
}

.pressure-unit{
  font-size:.82rem;
  font-weight:800;
  margin-top:.25rem;
  opacity:.92;
}

/* ---------- DIMMED ---------- */
.dimmed{
  opacity:.42;
  filter:blur(1.1px) saturate(.8);
}

/* ---------- BIT BUTTONS ---------- */
.bit-grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:.8rem;
}

.bit-button{
  padding:1rem .6rem;
  border-radius:14px;
  background:#1e293b;
  text-align:center;
  cursor:pointer;
  font-weight:700;
  font-size:1.05rem;
  letter-spacing:.2px;
  transition:.2s ease;
  border:1px solid transparent;
  user-select:none;
  box-shadow:0 8px 18px rgba(0,0,0,.22);
  color:#f8fafc;
}

.bit-button:hover{
  background:#334155;
  transform:translateY(-2px);
}

.bit-button.active{
  background:linear-gradient(135deg,#38bdf8,#22c55e);
  color:#03131d;
  border-color:rgba(255,255,255,.25);
  transform:translateY(-2px) scale(1.02);
  box-shadow:0 10px 22px rgba(34,197,94,.18), 0 0 0 4px var(--ring);
}

/* ---------- MODE BUTTONS ---------- */
.mode-row{
  display:flex;
  justify-content:center;
  gap:1rem;
  flex-wrap:wrap;
  margin-top:1rem;
}

.mode-button{
  min-width:240px;
  padding:1rem 1.2rem;
  border-radius:14px;
  background:#1e293b;
  text-align:center;
  cursor:pointer;
  font-weight:800;
  font-size:1rem;
  letter-spacing:.2px;
  transition:.2s ease;
  border:1px solid transparent;
  user-select:none;
  box-shadow:0 8px 18px rgba(0,0,0,.22);
  color:#f8fafc;
}

.mode-button:hover{
  background:#334155;
  transform:translateY(-2px);
}

.mode-button.active{
  background:linear-gradient(135deg,#38bdf8,#22c55e);
  color:#03131d;
  border-color:rgba(255,255,255,.25);
  transform:translateY(-2px) scale(1.02);
  box-shadow:0 10px 22px rgba(34,197,94,.18), 0 0 0 4px var(--ring);
}

.placeholder{
  margin-top:1rem;
  background:
    linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.01)),
    var(--panel2);
  border:1px solid rgba(255,255,255,.06);
  border-radius:20px;
  padding:1.2rem;
  text-align:center;
  color:#d1d5db;
}

/* ---------- FLOATING BIT IMAGE ---------- */
.home-bit-image{
  position:absolute;
  width:var(--bit-width);

  bottom:0;               /* ✅ sidotaan suoraan alareunaan */
  left:50%;

  transform:translate(-50%, 60%);  /* ✅ nostetaan kuvaa sopivasti */

  z-index:999;

  pointer-events:none;
  user-select:none;

  filter:
  drop-shadow(0 0 20px rgba(255,130,0,0.6))
  drop-shadow(0 0 40px rgba(255,130,0,0.5))
  drop-shadow(0 0 80px rgba(255,130,0,0.3));
}

/* ---------- MOBILE ---------- */

/* TABLET */
@media (max-width:1000px){
  .grid{
    grid-template-columns:repeat(2, minmax(220px, 1fr));
  }

  .pressure-grid{
    justify-content:center;
  }

  .card{
    margin-left:auto;
    margin-right:auto;
  }
}

/* MOBILE */
@media (max-width:700px){

  /* ✅ BACK BUTTON */
  .back {
    position: absolute;
    top: 12px;
    left: 11px;
    z-index: 100;
  }

  .page-header,
.page-header-drill {
  position: relative;
  margin-top: 20px;
  margin-bottom: 10px;
  transform: none;

  display:block;          /* ✅ tärkein muutos */
  text-align:center;      /* ✅ tämä hoitaa keskityksen */

  }

  /* ✅ otsikko oikeasti keskelle */
  .page-title{
    width:100%;
    text-align:center;
  }

  /* ✅ KORKEIN PRIORITEETTI – category sivut EI saa nousta ylös */
  .category-page .page-header{
    margin-top:0 !important;
  }

  /* ✅ grid EI saa alkaa liian ylhäällä */
  .category-page #categoryGrid{
    margin-top:25px !important;
  }

  /* ✅ varmistus ettei mikään nouse headerin päälle */
  .middle-section{
    align-items:flex-start;
    padding-top:15px;
  }

  /* ✅ drill korjaus */
  .drill-stage{
    margin-top:15px;
  }

  /* ✅ varmistaa ettei paneeli hyppää */
  .app-shell{
    margin-top:0;
  }

}
  /* ✅ GRID */
  .grid{
    grid-template-columns:1fr;
    justify-items:center;
    width:100%;
  }

  /* ✅ CARD */
  .card{
    width:100%;
  }

  /* ✅ SPACING */
  .content-wrap{
    padding:0 10px;
  }

  .mode-button{
    width:100%;
  }

  /* ✅ TYPO */
  .page-title{
    font-size:1.4rem;
    line-height:1.2;
  }

  .page-header-drill .page-title{
    font-size:1.2rem;
    font-weight:700;
  }

  /* ✅ BIT GRID */
  .bit-grid{
    grid-template-columns:repeat(2,1fr);
  }

  /* ✅ POWER */
  .power-value{
    font-size:1.6rem;
  }

  /* ✅ PRESSURE */
  .pressure-card{
    width:130px;
    height:130px;
  }

  .pressure-number{
    font-size:1.7rem;
  }

  .pressure-title{
    font-size:.75rem;
  }

  .pressure-unit{
    font-size:.75rem;
  }

  /* ✅ HARMAAT ALUEET KUNTOON */
  .top-section{
    min-height:110px;
    flex-basis:auto;
  }

  .middle-section{
    min-height:auto;
    padding:20px 10px;
  }

  .bottom-section{
    min-height:160px;
  }

  /* ✅ LOGO */
  .logo{
    width:180px;
  }

  .subtitle{
    font-size:1.05rem;
  }

  /* ✅ BIT IMAGE */


/* ✅ BIT IMAGE */
  .home-bit-image{
    width:400px;                 /* ✅ mobiilikoko */
    bottom:0;
    left:50%;
    transform:translate(-50%, -90%);
    z-index:999;
  }

  /* ✅ muut mobiilityylit tänne */
}


  /* ✅ EI NEGATIIVISIA SIIRTOJA */
  .page-header{
    margin-top:0;
    margin-bottom:6px;
  }

  .page-header-drill{
    margin-top:0;
    margin-bottom:0;
  }

  .drill-stage{
    margin-top:0;
  }

  .app-shell{
    margin-top:0;
  }

 .page-header{
  padding-left:0;
  min-height:50px;
  width:100%;
  text-align:center;
}

.page-header-drill{
  position:relative;
  z-index:20;

  min-height:55px;

  display:flex;              /* ✅ sama kuin toisessa headerissa */
  justify-content:center;    /* ✅ keskittää RD525 */
  align-items:center;        /* ✅ pystysuuntainen linjaus */
}
}

</style>
</head>

<body>
<div id="app"></div>
<footer>Sandvik Drilling Settings Tool – MVP</footer>

  percussion: { label: "Percussion Pressure", unit: "bar", min: 110, max: 220 },

/* ---------- MAP ---------- */
const drillConfigs = {
  RD1740: RD1740Config,

  HL1560: HL1560Config,
  RDX5: RDX5Config,
  RD525: RD525Config,
  RD535: RD535Config,
  RD314: RD314Config,
  RD414: RD414Config
};
/* ---------- SHARED PAGE LAYOUT ---------- */
function renderLayout(contentHTML, options = {}){
  const {
    showBit = false,
    bitSrc = "Bit.png",
    narrow = false
  } = options;

  return `
    <section class="app-layout ${options.category ? "category-page" : ""}">
      <section class="top-section">
        <div class="brand">
          <img
            class="logo"
            src="https://media.mktg.workday.com/is/image/workday/customer-logo-sandvik-medium-2?fmt=png-alpha"
            alt="Sandvik logo"
          />
          <div class="subtitle">Drilling Settings Tool</div>
        </div>
      </section>

<section class="middle-section">
  <div class="content-wrap ${narrow ? "narrow" : ""}">
    ${contentHTML}
  </div>
</section>

${options.backButton ? `
<div class="back" onclick="${options.backAction}">← Back</div>
` : ``}

<section class="bottom-section"></section>

${showBit ? `<img class="home-bit-image" src="${bitSrc}" alt="Drill bit" />` : ``}
</section>
`;
}
/* ---------- HOME ---------- */

function showHome(){
  const content = `
    <div class="grid">
      <div class="card" onclick="openCategory('longhole')">
        Long Hole Drills
        <small>RD927, RD1740, HL1560</small>
      </div>

      <div class="card" onclick="openCategory('face')">
        Face Drills
        <small>RDX5, RD525, RD535</small>
      </div>

      <div class="card" onclick="openCategory('bolting')">
        Bolting Drills
        <small>RD314, RD414</small>
      </div>

      <div class="card" onclick="openCategory('instructions')">
        Instructions
      </div>
    </div>
  `;

  app.innerHTML = renderLayout(content, { showBit: true, bitSrc: "Bit.png" });
}

/* ---------- CATEGORY ---------- */
function openCategory(key){
  const category = categories[key];
  currentCategory = key;

  const content = `
  <div class="page-header">
    <h1 class="page-title">${category.title}</h1>
  </div>

  <div style="margin-top:20px;">
    <div class="grid" id="categoryGrid"></div>
  </div>
`;


app.innerHTML = renderLayout(content, {
  narrow: false,
  showBit: true,
  bitSrc: "Bit.png",
  category: true,
  backButton: true,
  backAction: "showHome()"
});

  const grid = document.getElementById("categoryGrid");

  if(key === "instructions"){
  grid.innerHTML = `
    <div class="card" onclick="window.open('i-series adjustment guide.pdf')">
      Drilling Guide i-Series
      <small>PDF file</small>
    </div>
  `;
  return;
}

  category.items.forEach(item => {
    const btn = document.createElement("div");
    btn.className = "card";
    btn.textContent = item;
    btn.onclick = () => openDrill(item);
    grid.appendChild(btn);
  });
}

/* ---------- DRILL ---------- */
function openDrill(name){
  const content = `
    <div class="page-header-drill">
      <h1 class="page-title">${name}</h1>
    </div>

    <div id="drillContainer" class="drill-stage"></div>
  `;

  app.innerHTML = renderLayout(content, {
    backButton: true,
    backAction: "openCategory('" + currentCategory + "')"
  });

  const container = document.getElementById("drillContainer");
  const config = drillConfigs[name];

  if(config){
    renderDrillTool(container, config, name);
  } else {
    container.innerHTML = `
      <div class="placeholder">
        ${name} is coming later.
      </div>
    `;
  }
}
/* ---------- COMMON ---------- */
function interpolate(min, max, percent){
  return Math.round(min + (max - min) * (percent / 100));
}

function calculateFrequency(percussionBar, config){
  return config.frequency.min +
    (percussionBar - config.frequency.refMin) *
    (config.frequency.max - config.frequency.min) /
    (config.frequency.refMax - config.frequency.refMin);
}

function calculateRPM(freq, selectedBit){
  return Math.round((60 * freq * 7) / (Math.PI * selectedBit));
}

/* ---------- GENERIC DRILL MODULE ---------- */
function renderDrillTool(container, config, drillName){
  let selectedBit = config.defaults.selectedBit;
  let powerValue = config.defaults.powerValue;
  let mode = config.defaults.mode;

  container.innerHTML = `
    <div class="app-shell">
      <div class="block">
  <div class="block-title">Drilling Power</div>

  <div class="power-wrap">

  <div class="power-header">
    <div id="powerDisplay" class="power-value">${powerValue}%</div>
  </div>

  <input id="powerSlider" type="range" min="0" max="100" value="${powerValue}">

 <div style="
  display:flex;
  justify-content:space-between;
  margin-top:0px;
  font-size:.9rem;
  color:#cbd5e1;
  width:100%;
">
  <span>0% / Minimum</span>
  <span>100% / Maximum</span>
</div>
  </div>

</div>


      <div class="block">
        <div class="block-title">Pressure Values</div>

        <div class="pressure-grid" style="width:100%;">
          <div id="rotationCard" class="pressure-card">
            <div id="rotationTitle" class="pressure-title"></div>
            <div id="rotationValue" class="pressure-number">0</div>
            <div class="pressure-unit">${config.rotation.unit}</div>
          </div>

          <div id="rpmCard" class="pressure-card">
            <div class="pressure-title">Rotation Speed</div>
            <div id="rpmValue" class="pressure-number">0</div>
            <div class="pressure-unit">rpm</div>
          </div>

          <div id="percussionCard" class="pressure-card">
            <div class="pressure-title">${config.percussion.label}</div>
            <div id="percussionValue" class="pressure-number">0</div>
            <div class="pressure-unit">${config.percussion.unit}</div>
          </div>

          <div id="feedCard" class="pressure-card">
            <div class="pressure-title">${config.feed.label}</div>
            <div id="feedValue" class="pressure-number">0</div>
            <div class="pressure-unit">${config.feed.unit}</div>
          </div>
        </div>
      </div>

      <div class="block">
        <div class="block-title">Drill Bit Diameter</div>
        <div id="bitOptions" class="bit-grid"></div>

        <div class="mode-row">
          <div id="btnTorque" class="mode-button ${mode === "torque" ? "active" : ""}">
            Torque Control
          </div>
          <div id="btnFollow" class="mode-button ${mode === "follow" ? "active" : ""}">
            Feed Percussion Follow Up
          </div>
        </div>
      </div>
    </div>
  `;

  const powerSlider = container.querySelector("#powerSlider");
  const powerDisplay = container.querySelector("#powerDisplay");
  const rotationTitle = container.querySelector("#rotationTitle");
  const rotationValue = container.querySelector("#rotationValue");
  const percussionValue = container.querySelector("#percussionValue");
  const feedValue = container.querySelector("#feedValue");
  const rpmValue = container.querySelector("#rpmValue");
  const bitOptions = container.querySelector("#bitOptions");

  const rotationCard = container.querySelector("#rotationCard");
  const feedCard = container.querySelector("#feedCard");

  const btnTorque = container.querySelector("#btnTorque");
  const btnFollow = container.querySelector("#btnFollow");

  function updateRotationTitle(){
    if(mode === "torque"){
      rotationTitle.textContent = "Rotation Target";
    } else {
      rotationTitle.textContent = "Rotation Pressure";
    }
  }

  config.bits.forEach(size => {
    const btn = document.createElement("div");
    btn.className = "bit-button";
    btn.textContent = size + " mm";

    if(size === selectedBit){
      btn.classList.add("active");
    }

    btn.onclick = () => {
      selectedBit = size;
      bitOptions.querySelectorAll(".bit-button").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      update();
    };

    bitOptions.appendChild(btn);
  });

  btnTorque.onclick = () => {
    mode = "torque";
    btnTorque.classList.add("active");
    btnFollow.classList.remove("active");
    updateMode();
  };

  btnFollow.onclick = () => {
    mode = "follow";
    btnFollow.classList.add("active");
    btnTorque.classList.remove("active");
    updateMode();
  };

  powerSlider.addEventListener("input", e => {
    powerValue = Number(e.target.value);
    update();
  });

  function update(){
    powerDisplay.textContent = `${powerValue}%`;

    const rotationBar = interpolate(config.rotation.min, config.rotation.max, powerValue);
    const percussionBar = interpolate(config.percussion.min, config.percussion.max, powerValue);
    const feedBar = interpolate(config.feed.min, config.feed.max, powerValue);

    rotationValue.textContent = rotationBar;
    percussionValue.textContent = percussionBar;
    feedValue.textContent = feedBar;

    const freq = calculateFrequency(percussionBar, config);
    const rpm = calculateRPM(freq, selectedBit);
    rpmValue.textContent = rpm;
  }

  function updateMode(){
    rotationCard.classList.remove("dimmed");
    feedCard.classList.remove("dimmed");

    if(mode === "torque"){
      feedCard.classList.add("dimmed");
    }

    if(mode === "follow"){
      rotationCard.classList.add("dimmed");
    }

    updateRotationTitle();
  }

  update();
  updateMode();
}

/* ---------- START ---------- */
showHome();
</script>

<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('service-worker.js');
}
</script>
