<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<meta name="theme-color" content="#000000">
<title>Sandvik Drilling Settings Tool</title>

<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">

<style>
:root{
  --black:#000000;
  --white:#f3f3f3;
  --card-black:#050505;
  --sandvik:#ff8200;
  --panel:#0f1722;
  --panel2:#1a2430;
  --text:#e5e7eb;
  --muted:#aeb7c2;
  --ring:rgba(255,130,0,.18);
}

*{box-sizing:border-box}
html,body{height:100%}

html{
  background:#000000;
}

body{
  margin:0;
  font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
  background:var(--black);
  color:var(--text);
}
``
#app{min-height:100vh}

.app-layout{
  min-height:100vh;
  background:var(--black);
}

.hero{
  background:var(--black);
  color:#fff;
  padding:24px 20px 18px;
}

.hero-inner{
  width:100%;
  max-width:1180px;
  margin:0 auto;
}

.brand{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:10px;
}

.logo{
  width:360px;
  max-width:90%;
  filter:brightness(0) invert(1);
}

.subtitle{
  font-size:1.05rem;
  color:#ffffff;
  letter-spacing:.2px;
}

.title-row{
  display:flex;
  align-items:flex-start;
  justify-content:space-between;
  gap:16px;
  margin-top:22px;
}

.title-col{
  min-width:0;
}

.back{
  display:inline-flex;
  align-items:center;
  gap:8px;
  cursor:pointer;
  color:#f3f4f6;
  font-weight:800;
  font-size:1.15rem;
  margin-bottom:14px;
  text-decoration:none;
}

.back:hover{opacity:.92}

.page-title{
  margin:0;
  font-size:2.0rem;
  line-height:1.05;
  color:#fff;
}

.title-spacer{
  width:1px;
  min-height:1px;
}

.content-panel{
  background:var(--white);
  color:#111827;
  padding:34px 20px 42px;
}

.content-inner{
  width:100%;
  max-width:1180px;
  margin:0 auto;
}

.content-inner.narrow{
  max-width:1000px;
}



.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit, minmax(220px, 220px));
  gap:28px;
  justify-content:center;
  align-items:start;
}

.card{
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;

  width:220px;
  min-height:160px;

  background:var(--card-black);
  border:1px solid var(--sandvik);
  border-radius:30px;
  padding:2rem;
  cursor:pointer;
  text-align:center;

  /* ✅ TÄMÄ PITI OLLA MUKANA */
  color:#ffffff;

  box-shadow:0 18px 40px rgba(0,0,0,.22);

  transition:transform .15s ease, box-shadow .15s ease, background .15s ease;

  -webkit-tap-highlight-color: transparent;
}

/* ✅ Pieni teksti */
.card small{
  display:block;
  margin-top:.5rem;
  color:#d0d6de;
  font-weight:500;
  font-size:0.75rem;
}

/* ✅ Desktop hover */
.card:hover{
  transform:translateY(-3px);
  background:#111;
  box-shadow:0 16px 34px rgba(0,0,0,.26);
}

/* ✅ Mobiili tap */
.card:active{
  transform:scale(0.97);
  background:#111;
  box-shadow:0 10px 22px rgba(0,0,0,.25);
}

.bit-band{
  background:var(--black);
  padding:22px 20px 34px;
}

.bit-band-inner{
  width:100%;
  max-width:1180px;
  margin:0 auto;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:180px;
}


.bit-image{
  display:block;
  width:min(760px, 88vw);
  max-width:100%;
  height:auto;
  pointer-events:none;
  user-select:none;

  filter: drop-shadow(0 0 25px rgba(255,130,0,0.66));

}

.app-shell{
  background:linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.012)), var(--panel);
  border:1px solid rgba(255,255,255,.08);
  border-radius:28px;
  padding:1.8rem;
  box-shadow:0 18px 40px rgba(0,0,0,.22);
  color:var(--text);
}

.block{margin-bottom:1.8rem}
.block:last-child{margin-bottom:0}

.block-title{
  font-size:1rem;
  color:#d1d5db;
  margin-bottom:.75rem;
  letter-spacing:.3px;
  font-weight:700;
}

.tool-head{
  display:flex;
  align-items:flex-start;
  justify-content:space-between;
  gap:16px;
  margin-bottom:12px;
}

.drill-name{
  margin:0;
  font-size:1.55rem;
  font-weight:900;
  color:#fff;
}

.power-wrap{
  background:linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.01)), var(--panel2);
  border:1px solid rgba(255,255,255,.06);
  border-radius:22px;
  padding:.8rem 1rem .7rem;
}

.power-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:6px;
}

.power-value{
  font-size:1.35rem;
  line-height:1;
  font-weight:800;
  letter-spacing:.5px;
  color:#ffffff;
}

input[type=range]{
  -webkit-appearance:none;
  width:100%;
  height:8px;
  border-radius:6px;
  outline:none;
  background:linear-gradient(to right,#22c55e 0%,#22c55e 50%,#eab308 65%,#ef4444 100%);
}
input[type=range]::-webkit-slider-thumb{
  -webkit-appearance:none;
  width:20px;
  height:20px;
  border-radius:50%;
  background:#ffffff;
  border:2px solid #0f172a;
  cursor:pointer;
  margin-top:-6px;
}
input[type=range]::-moz-range-thumb{
  width:20px;
  height:20px;
  border-radius:50%;
  background:#ffffff;
  border:2px solid #0f172a;
  cursor:pointer;
}

.power-scale{
  display:flex;
  justify-content:space-between;
  margin-top:.5rem;
  font-size:.9rem;
  color:#cbd5e1;
  gap:18px;
}

.pressure-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit, minmax(140px, 1fr));
  gap:20px;
  justify-items:center;
  margin-top:.6rem;
}

.pressure-card{
  width:150px;
  height:150px;
  border-radius:50%;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:.75rem;
  background:linear-gradient(135deg,#60a5fa,#38bdf8);
  color:#03131d;
  box-shadow:0 14px 28px rgba(0,0,0,.28), inset 0 2px 8px rgba(255,255,255,.15);
  flex:0 0 auto;
  transition:opacity .2s ease, filter .2s ease, transform .2s ease;
}

.pressure-title{
  font-size:.82rem;
  font-weight:800;
  line-height:1.12;
  max-width:110px;
  margin-bottom:.35rem;
}
.pressure-number{font-size:2.05rem;line-height:1;font-weight:900;letter-spacing:.5px}
.pressure-unit{font-size:.82rem;font-weight:800;margin-top:.25rem;opacity:.92}
.dimmed{opacity:.42;filter:blur(1.1px) saturate(.8)}

.bit-grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:.8rem;
}

.bit-button,
.mode-button{
  padding:1rem .6rem;
  border-radius:14px;
  background:#1e293b;
  text-align:center;
  cursor:pointer;
  font-weight:700;
  font-size:1.05rem;
  letter-spacing:.2px;
  transition:.2s ease;
  border:1px solid transparent;
  user-select:none;
  box-shadow:0 8px 18px rgba(0,0,0,.22);
  color:#f8fafc;
}

.bit-button:hover,
.mode-button:hover{
  background:#334155;
  transform:translateY(-2px);
}

.bit-button.active,
.mode-button.active{
  background:linear-gradient(135deg,#ffb259,#ff8200);
  color:#111827;
  border-color:rgba(255,255,255,.25);
  transform:translateY(-2px) scale(1.02);
  box-shadow:0 10px 22px rgba(255,130,0,.18), 0 0 0 4px var(--ring);
}

.mode-row{
  display:flex;
  justify-content:center;
  gap:1rem;
  flex-wrap:wrap;
  margin-top:1rem;
}

.mode-button{
  min-width:240px;
  padding:1rem 1.2rem;
  font-weight:800;
  font-size:1rem;
}

.placeholder{
  margin-top:1rem;
  background:linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.01)), var(--panel2);
  border:1px solid rgba(255,255,255,.06);
  border-radius:20px;
  padding:1.2rem;
  text-align:center;
  color:#d1d5db;
}

footer{
  text-align:center;
  opacity:.6;
  font-size:.78rem;
  padding:1rem 0 2rem;
  background:#000;
  color:#fff;
}

@media (max-width:1000px){
  .grid{
    grid-template-columns:repeat(2, minmax(220px, 1fr));
    justify-items:center;
  }
  .card{margin-left:auto;margin-right:auto}
}

@media (max-width:700px){
  .hero{
    padding:16px 14px 14px;
  }

  .brand{
    gap:8px;
  }

  .logo{
    width:230px;
  }

  .subtitle{
    font-size:1rem;
    text-align:center;
  }

  .title-row{
    margin-top:16px;
    display:block;
  }

  .back{
    font-size:1rem;
    margin-bottom:12px;
  }

  .page-title{
    font-size:2.3rem;
    line-height:1.08;
    word-break:break-word;
  }

  .content-panel{
    padding:22px 12px 28px;
  }

  .content-inner,
  .content-inner.narrow{
    max-width:none;
  }

  .grid{
    grid-template-columns:1fr;
    gap:18px;
    justify-items:center;
    width:100%;
  }

  .card{
    width:100%;
    max-width:340px;
    min-height:128px;
    border-radius:26px;
  }

  .bit-band{
    padding:18px 12px 24px;
  }

  .bit-band-inner{
    min-height:120px;
  }

  .bit-image{
    width:min(92vw, 560px);
  }

  .app-shell{
    padding:1rem;
    border-radius:22px;
  }

  .tool-head{
    display:block;
  }

  .drill-name{
    font-size:1.25rem;
    margin-bottom:8px;
  }

  .power-value{
    font-size:1.6rem;
  }

  .power-scale{
    font-size:.78rem;
    gap:10px;
  }

  .pressure-grid{
    grid-template-columns:repeat(2, minmax(120px, 1fr));
    gap:14px;
  }

  .pressure-card{
    width:128px;
    height:128px;
  }

  .pressure-number{font-size:1.65rem}
  .pressure-title,
  .pressure-unit{font-size:.74rem}

  .bit-grid{
    grid-template-columns:repeat(2,1fr);
    gap:.65rem;
  }

  .bit-button,
  .mode-button{
    font-size:.95rem;
  }

  .mode-row{
    gap:.7rem;
  }

  .mode-button{
    width:100%;
    min-width:0;
  }
}
</style>
</head>
<body>
<div id="app"></div>
<footer>Sandvik Drilling Settings Tool – MVP</footer>

<script>
const app = document.getElementById("app");
let currentCategory = null;

const categories = {
  longhole: {
    title: "Long Hole Drills",
    items: ["RD1740", "RD927", "HL1560"]
  },
  face: {
    title: "Development Drills",
    items: ["RDX5", "RD525", "RD535"]
  },
  bolting: {
    title: "Bolting Drills",
    items: ["RD314", "RD414"]
  },
  instructions: {
    title: "Instructions",
    items: []
  }
};

const RD1740Config = {
  bits: [89, 102, 156, 202],
  defaults: { selectedBit: 102, powerValue: 60, mode: "torque" },
  feed: { label: "Feed Pressure", unit: "bar", min: 30, max: 100 },
  percussion: { label: "Percussion Pressure", unit: "bar", min: 100, max: 220 },
  rotation: { label: "Rotation Torque", unit: "bar", min: 35, max: 65 },
  frequency: { min: 30, max: 38, refMin: 90, refMax: 220 }
};

const RD927Config = {
  bits: [89, 102, 156, 202],
  defaults: { selectedBit: 102, powerValue: 60, mode: "torque" },
  feed: { label: "Feed Pressure", unit: "bar", min: 30, max: 100 },
  percussion: { label: "Percussion Pressure", unit: "bar", min: 100, max: 200 },
  rotation: { label: "Rotation Torque", unit: "bar", min: 30, max: 60 },
  frequency: { min: 45, max: 56, refMin: 100, refMax: 200 }
};

const HL1560Config = {
  bits: bits: [89, 102, 115, 127, 156, 202],,
  defaults: { selectedBit: 89, powerValue: 60, mode: "torque" },
  feed: { label: "Feed Pressure", unit: "bar", min: 40, max: 80 },
  percussion: { label: "Percussion Pressure", unit: "bar", min: 100, max: 220 },
  rotation: { label: "Rotation Torque", unit: "bar", min: 30, max: 60 },
  frequency: { min: 30, max: 40, refMin: 100, refMax: 200 }
};

const RDX5Config = {
 bits: [41, 43, 45, 48, 51, 64, 76, 89],
  defaults: { selectedBit: 51, powerValue: 60, mode: "torque" },
  feed: { label: "Feed Pressure", unit: "bar", min: 40, max: 80 },
  percussion: { label: "Percussion Pressure", unit: "bar", min: 110, max: 250 },
  rotation: { label: "Rotation Torque", unit: "bar", min: 30, max: 60 },
  frequency: { min: 50, max: 67, refMin: 110, refMax: 230 }
};

const RD525Config = {
  bits: [41, 43, 45, 48, 51, 64, 76, 89],
  defaults: { selectedBit: 51, powerValue: 60, mode: "torque" },
  feed: { label: "Feed Pressure", unit: "bar", min: 50, max: 140 },
  percussion: { label: "Percussion Pressure", unit: "bar", min: 110, max: 230 },
  rotation: { label: "Rotation Torque", unit: "bar", min: 45, max: 70 },
  frequency: { min: 67, max: 92, refMin: 110, refMax: 230 }
};

const RD535Config = {
 bits: [41, 43, 45, 48, 51, 64, 76, 89],
  defaults: { selectedBit: 51, powerValue: 60, mode: "torque" },
  feed: { label: "Feed Pressure", unit: "bar", min: 40, max: 80 },
  percussion: { label: "Percussion Pressure", unit: "bar", min: 110, max: 220 },
  rotation: { label: "Rotation Torque", unit: "bar", min: 30, max: 60 },
  frequency: { min: 56, max: 78, refMin: 110, refMax: 220 }
};

const RD314Config = {
  bits: [33, 35, 37, 41],
  defaults: { selectedBit: 35, powerValue: 60, mode: "torque" },
  feed: { label: "Feed Pressure", unit: "bar", min: 50, max: 110 },
  percussion: { label: "Percussion Pressure", unit: "bar", min: 100, max: 180 },
  rotation: { label: "Rotation Torque", unit: "bar", min: 45, max: 65 },
  frequency: { min: 80, max: 110, refMin: 100, refMax: 180 }
};

const RD414Config = {
  bits: [51, 57, 60, 64, 70, 76, 89],
  defaults: { selectedBit: 51, powerValue: 60, mode: "torque" },
  feed: { label: "Feed Pressure", unit: "bar", min: 40, max: 80 },
  percussion: { label: "Percussion Pressure", unit: "bar", min: 110, max: 220 },
  rotation: { label: "Rotation Torque", unit: "bar", min: 30, max: 60 },
  frequency: { min: 56, max: 78, refMin: 110, refMax: 220 }
};

const drillConfigs = {
  RD1740: RD1740Config,
  RD927: RD927Config,
  HL1560: HL1560Config,
  RDX5: RDX5Config,
  RD525: RD525Config,
  RD535: RD535Config,
  RD314: RD314Config,
  RD414: RD414Config
};

function renderPage({ title = "", backAction = "", contentHTML = "", showBit = false, bitSrc = "Bit.png", narrow = false }){
  const backHTML = backAction
    ? `<div class="back" onclick="${backAction}">← Back</div>`
    : "";

  const titleHTML = title
    ? `
      <div class="title-row">
        <div class="title-col">
          ${backHTML}
          <h1 class="page-title">${title}</h1>
        </div>
        <div class="title-spacer"></div>
      </div>
    `
    : "";

  return `
    <section class="app-layout">
      <section class="hero">
        <div class="hero-inner">
          <div class="brand">
            <img
              class="logo"
              src="https://media.mktg.workday.com/is/image/workday/customer-logo-sandvik-medium-2?fmt=png-alpha"
              alt="Sandvik logo"
            />
            <div class="subtitle">Drilling Settings Tool</div>
          </div>
          ${titleHTML}
        </div>
      </section>

      <section class="content-panel">
        <div class="content-inner ${narrow ? "narrow" : ""}">
          ${contentHTML}
        </div>
      </section>

      ${showBit ? `
        <section class="bit-band">
          <div class="bit-band-inner">
            <img class="bit-image" src="${bitSrc}" alt="Drill bit" />
          </div>
        </section>
      ` : ""}
    </section>
  `;
}

function showHome(){
  const content = `
    <div class="grid">
      <div class="card" onclick="openCategory('longhole')">
        Long Hole Drills
        <small>RD927, RD1740, HL1560</small>
      </div>

      <div class="card" onclick="openCategory('face')">
        Development Drills
        <small>RDX5, RD525, RD535</small>
      </div>

      <div class="card" onclick="openCategory('bolting')">
        Bolting Drills
        <small>RD314, RD414</small>
      </div>

      <div class="card" onclick="openCategory('instructions')">
        Instructions
      </div>
    </div>
  `;

  app.innerHTML = renderPage({
  contentHTML: content,
  showBit: true,
  bitSrc: "Bit.png"
});
}

function openCategory(key){
  const category = categories[key];
  currentCategory = key;

  const content = `
    <div class="grid" id="categoryGrid"></div>
  `;

app.innerHTML = renderPage({
  title: category.title,
  backAction: "showHome()",
  contentHTML: content,
  showBit: true,
  bitSrc: "Bit.png"
});

  const grid = document.getElementById("categoryGrid");

 if(key === "instructions"){
  grid.innerHTML = `

<div class="card" onclick="window.open('Drilling App Guide.pdf')">
      Drilling App Guide
      <small>PDF file</small>
    </div>

    <div class="card" onclick="window.open('i-series adjustment guide.pdf')">
      Drilling Guide i-Series
      <small>PDF file</small>
    </div>

    <div class="card" onclick="window.open('Top Hammer Catalog.pdf')">
      Top Hammer Catalog
      <small>PDF file</small>
    </div>

  `;
  return;

  }

  category.items.forEach(item => {
    const btn = document.createElement("div");
    btn.className = "card";
    btn.textContent = item;
    btn.onclick = () => openDrill(item);
    grid.appendChild(btn);
  });
}

function openDrill(name){
  const content = `
    <div id="drillContainer"></div>
  `;

  app.innerHTML = renderPage({
    title: name,
    backAction: `openCategory('${currentCategory}')`,
    contentHTML: content,
    narrow: true,
    showBit: false
  });

  const container = document.getElementById("drillContainer");
  const config = drillConfigs[name];

  if(config){
    renderDrillTool(container, config, name);
  } else {
    container.innerHTML = `
      <div class="placeholder">
        ${name} is coming later.
      </div>
    `;
  }
}

function interpolate(min, max, percent){
  return Math.round(min + (max - min) * (percent / 100));
}

function calculateFrequency(percussionBar, config){
  return config.frequency.min +
    (percussionBar - config.frequency.refMin) *
    (config.frequency.max - config.frequency.min) /
    (config.frequency.refMax - config.frequency.refMin);
}

function calculateRPM(freq, selectedBit){
  return Math.round((60 * freq * 7) / (Math.PI * selectedBit));
}

function renderDrillTool(container, config, drillName){
  const currentDrillName = drillName;
  let selectedBit = config.defaults.selectedBit;
  let powerValue = config.defaults.powerValue;
  let mode = config.defaults.mode;

  container.innerHTML = `
    <div class="app-shell">
      <div class="block">
        <div class="tool-head">
          <div class="block-title">Drilling Power</div>
          
        </div>

        <div class="power-wrap">
          <div class="power-header">
            <div id="powerDisplay" class="power-value">${powerValue}%</div>
          </div>

          <input id="powerSlider" type="range" min="0" max="100" value="${powerValue}">

          <div class="power-scale">
           <span>0% / Min</span>
           <span>Max / 100%</span>
          </div>
        </div>
      </div>

      <div class="block">
        <div class="block-title">Pressure Values</div>

        <div class="pressure-grid" style="width:100%;">
          <div id="rotationCard" class="pressure-card">
            <div id="rotationTitle" class="pressure-title"></div>
            <div id="rotationValue" class="pressure-number">0</div>
            <div class="pressure-unit">${config.rotation.unit}</div>
          </div>

          <div id="rpmCard" class="pressure-card">
            <div class="pressure-title">Rotation Speed</div>
            <div id="rpmValue" class="pressure-number">0</div>
            <div class="pressure-unit">rpm</div>
          </div>

          <div id="percussionCard" class="pressure-card">
            <div class="pressure-title">${config.percussion.label}</div>
            <div id="percussionValue" class="pressure-number">0</div>
            <div class="pressure-unit">${config.percussion.unit}</div>
          </div>

          <div id="feedCard" class="pressure-card">
            <div class="pressure-title">${config.feed.label}</div>
            <div id="feedValue" class="pressure-number">0</div>
            <div class="pressure-unit">${config.feed.unit}</div>
          </div>
        </div>
      </div>

      <div class="block">
        <div class="block-title">Drill Bit Diameter</div>
        <div id="bitOptions" class="bit-grid"></div>

        <div class="mode-row">
          <div id="btnTorque" class="mode-button ${mode === "torque" ? "active" : ""}">
            Torque Control
          </div>
          <div id="btnFollow" class="mode-button ${mode === "follow" ? "active" : ""}">
            Feed Percussion Follow Up
          </div>
        </div>
      </div>
    </div>
  `;

  const powerSlider = container.querySelector("#powerSlider");
  const powerDisplay = container.querySelector("#powerDisplay");
  const rotationTitle = container.querySelector("#rotationTitle");
  const rotationValue = container.querySelector("#rotationValue");
  const percussionValue = container.querySelector("#percussionValue");
  const feedValue = container.querySelector("#feedValue");
  const rpmValue = container.querySelector("#rpmValue");
  const bitOptions = container.querySelector("#bitOptions");
  const rotationCard = container.querySelector("#rotationCard");
  const feedCard = container.querySelector("#feedCard");
  const btnTorque = container.querySelector("#btnTorque");
  const btnFollow = container.querySelector("#btnFollow");

  function updateRotationTitle(){
    rotationTitle.textContent = mode === "torque" ? "Rotation Target" : "Rotation Pressure";
  }

  config.bits.forEach(size => {
    const btn = document.createElement("div");
    btn.className = "bit-button";
    btn.textContent = size + " mm";

    if(size === selectedBit){
      btn.classList.add("active");
    }

    btn.onclick = () => {
      selectedBit = size;
      bitOptions.querySelectorAll(".bit-button").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      update();
    };

    bitOptions.appendChild(btn);
  });

  btnTorque.onclick = () => {
    mode = "torque";
    btnTorque.classList.add("active");
    btnFollow.classList.remove("active");
    updateMode();
  };

  btnFollow.onclick = () => {
    mode = "follow";
    btnFollow.classList.add("active");
    btnTorque.classList.remove("active");
    updateMode();
  };

  powerSlider.addEventListener("input", e => {
    powerValue = Number(e.target.value);
    update();
  });

  function update(){
    powerDisplay.textContent = `${powerValue}%`;

    const rotationBar = interpolate(config.rotation.min, config.rotation.max, powerValue);
    const percussionBar = interpolate(config.percussion.min, config.percussion.max, powerValue);
    const feedBar = interpolate(config.feed.min, config.feed.max, powerValue);

    rotationValue.textContent = rotationBar;
    percussionValue.textContent = percussionBar;
    feedValue.textContent = feedBar;

    const freq = calculateFrequency(percussionBar, config);
    const rpm = calculateRPM(freq, selectedBit);
    rpmValue.textContent = rpm;
  }

  function updateMode(){
    rotationCard.classList.remove("dimmed");
    feedCard.classList.remove("dimmed");

    if(mode === "torque"){
      feedCard.classList.add("dimmed");
    }

    if(mode === "follow"){
      rotationCard.classList.add("dimmed");
    }

    updateRotationTitle();
    update();
  }

  updateRotationTitle();
  update();
  updateMode();
}

showHome();
</script>

<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('service-worker.js');
}
</script>

</body>
